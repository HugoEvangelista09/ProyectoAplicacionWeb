<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socios | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="socios">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Sistema</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <nav class="nav-links">
                <a href="/dashboard.html">Resumen</a>
                <a class="active" href="/socios.html">Socios</a>
                <a href="/puestos.html">Puestos</a>
                <a href="/motivos.html">Motivos</a>
                <a href="/deudas.html">Deudas</a>
                <a href="/pagos.html">Pagos</a>
                <a href="/reportes.html">Reportes</a>
                <a href="/usuarios.html">Usuarios</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Modulo</p>
                    <h1>Socios</h1>
                </div>
                <button id="loadSociosBtn" type="button">Actualizar lista</button>
            </header>

            <div id="messageBox" class="message hidden"></div>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Formulario</p>
                        <h2>Registrar o editar socio</h2>
                    </div>
                </div>

                <form id="socioForm" class="form-grid" novalidate>
                    <input type="hidden" id="socioId">
                    <label>
                        Nombre
                        <input id="socioNombre" required type="text">
                    </label>
                    <label>
                        Apellido
                        <input id="socioApellido" required type="text">
                    </label>
                    <label>
                        DNI
                        <input id="socioDni" required type="text">
                    </label>
                    <label>
                        Telefono
                        <input id="socioTelefono" type="text">
                    </label>
                    <label>
                        Email
                        <input id="socioEmail" type="email">
                    </label>
                    <label>
                        Username (para login)
                        <input id="socioUsername" type="text" placeholder="Opcional">
                    </label>
                    <label>
                        Contrasena (para login)
                        <input id="socioPassword" type="password" placeholder="Dejar vacio para no cambiar">
                    </label>
                    <div class="actions">
                        <button type="submit">Guardar socio</button>
                        <button id="resetSocioBtn" class="secondary-btn" type="button">Limpiar</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Listado</p>
                        <h2>Socios registrados</h2>
                    </div>
                    <div class="section-title-right">
                        <div id="sociosPage"></div>
                        <div class="search-bar">
                            <input type="search" id="searchSocios" placeholder="Buscar socios...">
                        </div>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>DNI</th>
                                <th>Telefono</th>
                                <th>Email</th>
                                <th>Username</th>
                                <th>Login</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="sociosTable"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/app.js"></script>
</body>
</html>
