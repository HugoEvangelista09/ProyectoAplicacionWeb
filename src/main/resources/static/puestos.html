<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puestos | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="puestos">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Sistema</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <nav class="nav-links">
                <a href="/dashboard.html">Resumen</a>
                <a href="/socios.html">Socios</a>
                <a class="active" href="/puestos.html">Puestos</a>
                <a href="/motivos.html">Motivos</a>
                <a href="/deudas.html">Deudas</a>
                <a href="/pagos.html">Pagos</a>
                <a href="/reportes.html">Reportes</a>
                <a href="/usuarios.html">Usuarios</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Modulo</p>
                    <h1>Puestos</h1>
                </div>
                <button id="loadPuestosBtn" type="button">Actualizar lista</button>
            </header>

            <div id="messageBox" class="message hidden"></div>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Formulario</p>
                        <h2>Registrar o editar puesto</h2>
                    </div>
                    <p id="puestoNumeroInfo" class="muted" style="display:none;font-weight:600;"></p>
                </div>

                <form id="puestoForm" class="form-grid" novalidate>
                    <input type="hidden" id="puestoId">
                    <label>
                        Categoria
                        <select id="puestoCategoria" required>
                            <option value="" disabled selected>Seleccionar categoria</option>
                            <option value="1">Naturista</option>
                            <option value="2">Abarrotes</option>
                            <option value="3">Plasticos</option>
                            <option value="4">Pollos</option>
                            <option value="5">Carnes</option>
                            <option value="6">Ferreteria</option>
                            <option value="7">Ropa</option>
                            <option value="8">Verduras</option>
                            <option value="9">Pescados</option>
                            <option value="10">Restaurantes</option>
                        </select>
                    </label>
                    <label>
                        Descripcion
                        <input id="puestoDescripcion" type="text" placeholder="Descripcion opcional">
                    </label>
                    <label>
                        Socio asignado
                        <select id="puestoSocioId">
                            <option value="">Pertenece a la asociacion</option>
                        </select>
                    </label>
                    <div class="actions">
                        <button type="submit">Guardar puesto</button>
                        <button id="resetPuestoBtn" class="secondary-btn" type="button">Limpiar</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Listado</p>
                        <h2>Puestos registrados</h2>
                    </div>
                    <div class="search-bar">
                        <input type="search" id="searchPuestos" placeholder="Buscar puestos...">
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Numero</th>
                                <th>Categoria</th>
                                <th>Descripcion</th>
                                <th>Socio</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="puestosTable"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/app.js"></script>
</body>
</html>
