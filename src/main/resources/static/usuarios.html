<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="usuarios">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Sistema</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <nav class="nav-links">
                <a href="/dashboard.html">Resumen</a>
                <a href="/socios.html">Socios</a>
                <a href="/puestos.html">Puestos</a>
                <a href="/motivos.html">Motivos</a>
                <a href="/deudas.html">Deudas</a>
                <a href="/pagos.html">Pagos</a>
                <a href="/reportes.html">Reportes</a>
                <a class="active" href="/usuarios.html">Usuarios</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Modulo</p>
                    <h1>Usuarios</h1>
                </div>
                <button id="loadUsuariosBtn" type="button">Actualizar lista</button>
            </header>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Formulario</p>
                        <h2>Registrar o editar usuario</h2>
                    </div>
                </div>

                <form id="usuarioForm" class="form-grid">
                    <input type="hidden" id="usuarioId">
                    <label>
                        Username
                        <input id="usuarioUsername" required type="text">
                    </label>
                    <label>
                        Contrasena
                        <input id="usuarioPassword" type="password" placeholder="Dejar en blanco para no cambiar">
                    </label>
                    <label>
                        Nombre Completo
                        <input id="usuarioNombreCompleto" required type="text">
                    </label>
                    <label>
                        DNI (8 digitos)
                        <input id="usuarioDni" required type="text" maxlength="8">
                    </label>
                    <label>
                        RUC (11 digitos)
                        <input id="usuarioRuc" required type="text" maxlength="11">
                    </label>
                    <label>
                        Email
                        <input id="usuarioEmail" type="email">
                    </label>
                    <label>
                        Telefono
                        <input id="usuarioTelefono" type="text">
                    </label>
                    <label>
                        Direccion
                        <input id="usuarioDireccion" type="text">
                    </label>
                    <label>
                        Rol
                        <select id="usuarioRol" required>
                            <option value="" disabled selected>Seleccionar rol</option>
                            <option value="1">Administrador</option>
                            <option value="2">Operador</option>
                        </select>
                    </label>
                    <div class="actions">
                        <button type="submit">Guardar usuario</button>
                        <button id="resetUsuarioBtn" class="secondary-btn" type="button">Limpiar</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Listado</p>
                        <h2>Usuarios registrados</h2>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Nombre Completo</th>
                                <th>DNI</th>
                                <th>RUC</th>
                                <th>Email</th>
                                <th>Telefono</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuariosTable"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/app.js"></script>
</body>
</html>
