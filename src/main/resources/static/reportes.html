<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="reportes">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Sistema</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <nav class="nav-links">
                <a href="/dashboard.html">Resumen</a>
                <a href="/socios.html">Socios</a>
                <a href="/puestos.html">Puestos</a>
                <a href="/motivos.html">Motivos</a>
                <a href="/deudas.html">Deudas</a>
                <a href="/pagos.html">Pagos</a>
                <a class="active" href="/reportes.html">Reportes</a>
                <a href="/usuarios.html">Usuarios</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Modulo</p>
                    <h1>Reportes</h1>
                </div>
            </header>

            <!-- Caja diaria -->
            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Reporte 1</p>
                        <h2>Caja diaria</h2>
                    </div>
                </div>
                <form id="reporteCajaForm" class="form-grid" novalidate>
                    <label>
                        Fecha
                        <input id="reporteCajaFecha" type="date">
                    </label>
                    <div class="actions">
                        <button type="submit">Consultar</button>
                        <button type="button" id="btnPdfCaja" class="secondary-btn" disabled>Descargar PDF</button>
                        <button type="button" id="btnCsvCaja" class="secondary-btn" disabled>Descargar CSV</button>
                    </div>
                </form>
                <div id="reportesCajaOutput" class="hidden" style="margin-top:1.25rem;"></div>
            </section>

            <!-- Caja por rango -->
            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Reporte 2</p>
                        <h2>Caja por rango</h2>
                    </div>
                </div>
                <form id="reporteRangoForm" class="form-grid" novalidate>
                    <label>
                        Desde
                        <input id="reporteDesde" type="date">
                    </label>
                    <label>
                        Hasta
                        <input id="reporteHasta" type="date">
                    </label>
                    <div class="actions">
                        <button type="submit">Consultar</button>
                        <button type="button" id="btnPdfRango" class="secondary-btn" disabled>Descargar PDF</button>
                        <button type="button" id="btnCsvRango" class="secondary-btn" disabled>Descargar CSV</button>
                    </div>
                </form>
                <div id="reportesRangoOutput" class="hidden" style="margin-top:1.25rem;"></div>
            </section>

            <!-- Deuda por socio -->
            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Reporte 3</p>
                        <h2>Deuda por socio</h2>
                    </div>
                </div>
                <form id="reporteDeudaForm" class="form-grid" novalidate>
                    <p class="muted" style="grid-column:1/-1;margin:0;">Consulta el consolidado de deudas pendientes agrupado por socio.</p>
                    <div class="actions">
                        <button type="submit">Consultar</button>
                        <button type="button" id="btnPdfDeuda" class="secondary-btn" disabled>Descargar PDF</button>
                        <button type="button" id="btnCsvDeuda" class="secondary-btn" disabled>Descargar CSV</button>
                    </div>
                </form>
                <div id="reportesDeudaOutput" class="hidden" style="margin-top:1.25rem;"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
