<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="socio-dashboard">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Portal Socio</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <p id="sidebarUser" class="sidebar-username"></p>
            <nav class="nav-links">
                <a class="active" href="/socio-dashboard.html">Resumen</a>
                <a href="/socio-puestos.html">Mis Puestos</a>
                <a href="/socio-deudas.html">Mis Deudas</a>
                <a href="/socio-pagos.html">Mis Pagos</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Bienvenido</p>
                    <h1 id="socioNombreHeader">Mi Panel</h1>
                </div>
                <button id="refreshSocioDashBtn" type="button">Actualizar</button>
            </header>

            <section class="stats-grid">
                <article class="stat-card">
                    <span>Mis Puestos</span>
                    <strong id="socioStatPuestos">0</strong>
                </article>
                <article class="stat-card">
                    <span>Deudas pendientes</span>
                    <strong id="socioStatDeudas">0</strong>
                </article>
                <article class="stat-card">
                    <span>Pagos realizados</span>
                    <strong id="socioStatPagos">0</strong>
                </article>
            </section>

            <section class="content-grid">
                <article class="card">
                    <div class="section-title">
                        <div>
                            <p class="eyebrow">Pendientes</p>
                            <h2>Mis deudas recientes</h2>
                        </div>
                        <a class="text-link" href="/socio-deudas.html">Ver todas</a>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Fecha</th><th>Descripcion</th><th>Total</th></tr>
                            </thead>
                            <tbody id="socioDashDeudas"></tbody>
                        </table>
                    </div>
                </article>

                <article class="card">
                    <div class="section-title">
                        <div>
                            <p class="eyebrow">Actividad</p>
                            <h2>Mis ultimos pagos</h2>
                        </div>
                        <a class="text-link" href="/socio-pagos.html">Ver todos</a>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Fecha</th><th>Monto</th></tr>
                            </thead>
                            <tbody id="socioDashPagos"></tbody>
                        </table>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/app.js"></script>
</body>
</html>
