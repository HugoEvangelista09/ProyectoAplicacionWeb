<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deudas | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="deudas">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Sistema</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <nav class="nav-links">
                <a href="/dashboard.html">Resumen</a>
                <a href="/socios.html">Socios</a>
                <a href="/puestos.html">Puestos</a>
                <a href="/motivos.html">Motivos</a>
                <a class="active" href="/deudas.html">Deudas</a>
                <a href="/pagos.html">Pagos</a>
                <a href="/reportes.html">Reportes</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Modulo</p>
                    <h1>Deudas</h1>
                </div>
                <button id="loadDeudasBtn" type="button">Actualizar lista</button>
            </header>

            <div id="messageBox" class="message hidden"></div>

            <section class="card">
                <form id="deudaForm" class="form-grid">
                    <label>
                        Socio
                        <select id="deudaSocioId" required></select>
                    </label>
                    <label>
                        Fecha
                        <input id="deudaFecha" type="date">
                    </label>
                    <label class="full-width">
                        Descripcion
                        <input id="deudaDescripcion" type="text" placeholder="Ej. cuota mensual de abril">
                    </label>
                    <label>
                        Motivo
                        <select id="deudaMotivoId" required></select>
                    </label>
                    <label>
                        Monto
                        <input id="deudaMonto" min="0.01" required step="0.01" type="number">
                    </label>
                    <label class="full-width">
                        Observacion
                        <input id="deudaObservacion" type="text">
                    </label>
                    <div class="actions">
                        <button type="submit">Registrar deuda</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Socio</th>
                                <th>Fecha</th>
                                <th>Descripcion</th>
                                <th>Estado</th>
                                <th>Total pendiente</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="deudasTable"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
