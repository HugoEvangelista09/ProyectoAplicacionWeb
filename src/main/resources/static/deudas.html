<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deudas | Asociacion de Comerciantes</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="deudas">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div>
                <p class="eyebrow">Sistema</p>
                <h2>Asociación APROMEC</h2>
            </div>
            <nav class="nav-links">
                <a href="/dashboard.html">Resumen</a>
                <a href="/socios.html">Socios</a>
                <a href="/puestos.html">Puestos</a>
                <a href="/motivos.html">Motivos</a>
                <a class="active" href="/deudas.html">Deudas</a>
                <a href="/pagos.html">Pagos</a>
                <a href="/reportes.html">Reportes</a>
                <a href="/usuarios.html">Usuarios</a>
            </nav>
            <button id="logoutBtn" class="secondary-btn" type="button">Cerrar sesión</button>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Modulo</p>
                    <h1>Deudas</h1>
                </div>
                <button id="loadDeudasBtn" type="button">Actualizar lista</button>
            </header>

            <div id="messageBox" class="message hidden"></div>

            <section class="card">
                <form id="deudaForm" class="form-grid" novalidate>
                    <label>
                        Socio
                        <select id="deudaSocioId" required></select>
                    </label>
                    <label>
                        Fecha
                        <input id="deudaFecha" type="date">
                    </label>
                    <label class="full-width">
                        Descripcion
                        <input id="deudaDescripcion" type="text" placeholder="Ej. cuota mensual de abril">
                    </label>
                    <fieldset class="full-width">
                        <legend>Ítems de la deuda</legend>
                        <div class="form-grid" style="margin-bottom:0.75rem">
                            <label>
                                Motivo
                                <select id="deudaMotivoId"></select>
                            </label>
                            <label>
                                Monto
                                <input id="deudaMonto" min="0.01" step="0.01" type="number" placeholder="0.00">
                            </label>
                            <label>
                                Observación
                                <input id="deudaObservacion" type="text" placeholder="Opcional">
                            </label>
                            <div style="display:flex;align-items:flex-end">
                                <button type="button" id="addItemBtn" class="secondary-btn" style="width:100%">+ Añadir ítem</button>
                            </div>
                        </div>
                        <div id="deudaItemsList"><p class="muted" style="font-size:0.85rem;margin:0">Sin ítems añadidos aún.</p></div>
                    </fieldset>
                    <div class="actions">
                        <button type="submit">Registrar deuda</button>
                        <span id="itemsCountMsg" class="muted" style="font-size:0.85rem"></span>
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="section-title">
                    <div>
                        <p class="eyebrow">Listado</p>
                        <h2>Deudas registradas</h2>
                    </div>
                    <div class="section-title-right">
                        <div id="deudasPage"></div>
                        <div class="search-bar">
                            <input type="search" id="searchDeudas" placeholder="Buscar deudas...">
                        </div>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Socio</th>
                                <th>Fecha</th>
                                <th>Descripcion</th>
                                <th>Estado</th>
                                <th>Total pendiente</th>
                                <th>Detalle</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="deudasTable"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/app.js"></script>
</body>
</html>
